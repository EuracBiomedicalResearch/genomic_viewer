---

# Example configuration file for Genomic Viewer, used in the tutorial.

# XXX what does "default" mean? I am sure it's needed. Should have a quick
# explanation. Also, why does the file start with three dashes in the first
# line. Remember, the config file is the file where somebody can screw it up
# all.
default:

  # Input files and track label handling.

  # Data directory to search for.
  # XXX This looks funny. Why do we have two slashes here? A leading slash
  # normally indicates an absolute path. Needs explanation.
  data.dir: "/data/"
  # bigWig directory and list of files.
  # Directory that contains bigWig data files.
  bw.dir: "GSE212908_RAW_ATAC_bigwig"
  # XXX needs more explanation, also here in this file.
  bw.ext: "treat_pileup.bw"
  # List of bigWig tracks to show.
  bw.names: ["Kidney cortex 12", "Kidney cortex 15"]
  # BEDPE files section.
  bedpe.dir: "GSE212910_RAW_HiC_bedpe"
  bedpe.ext: "GSM6560960_mustache_0.1_0.2_out.diffloops_in_cortex_2.bedpe"
  bedpe.names: ["HiC arches"]
  # BED files section.
  bed.dir: "GSE212908_ATAC_peaks"
  bed.ext: "GSE212908_RAM012_013_015_peak_masterlist.bed"
  bed.names: ["ATAC peaks"]
  # HiC files section.
  hic.dir: "GSE212910_RAW_HiC"
  hic.ext: "GSM7749626_Cortex_partitioned_donor5_DM.hic"
  hic.names: ["HiC cortex"]
  # GWAS files section.
  gwas.dir: "GWAScatalog_KidneyDisease"
  gwas.ext: "relocatedCol.tsv.gz"
  gwas.names: ["GWAS chronic kidney disease"]
  # Categorical BED files section.
  cat.dir: ""
  cat.file: "regulatory_elements_hg38.bed"
  cat.names: ["Regulatory Elements"]
  # XXX What is that?
  reg.dir: ""
  reg.file: "Example_region_table.bed"
